# Routes Traefik to Home Assistant, which runs on network_mode: host and so
# can't be discovered via container labels. Traefik dials back to the host's
# port 8123 through host.docker.internal (mapped via extra_hosts in compose).
#
# NOTE: Traefik's file provider does NOT expand ${VAR}. It renders files as Go
# templates, so the domain is read from the traefik container's env via
# {{ env "DOMAIN" }} (passed in docker-compose.yml, defaulting to localhost).
http:
  routers:
    homeassistant:
      rule: 'Host(`homeassistant.{{ env "DOMAIN" }}`)'
      entrypoints:
        - web
      service: homeassistant
    homeassistant-secure:
      rule: 'Host(`homeassistant.{{ env "DOMAIN" }}`)'
      entrypoints:
        - websecure
      tls: {}
      service: homeassistant
  services:
    homeassistant:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8123"
