# Routes Traefik to Music Assistant, which runs on network_mode: host and so
# can't be discovered via container labels. Traefik dials back to the host's
# port 8095 through host.docker.internal (mapped via extra_hosts in compose).
#
# NOTE: Traefik's file provider does NOT expand ${VAR}. It renders files as Go
# templates, so the domain is read from the traefik container's env via
# {{ env "DOMAIN" }} (passed in docker-compose.yml, defaulting to localhost).
http:
  routers:
    musicassistant:
      rule: 'Host(`ha-music.{{ env "DOMAIN" }}`)'
      entrypoints:
        - web
      service: musicassistant
    musicassistant-secure:
      rule: 'Host(`ha-music.{{ env "DOMAIN" }}`)'
      entrypoints:
        - websecure
      tls: {}
      service: musicassistant
  services:
    musicassistant:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8095"
