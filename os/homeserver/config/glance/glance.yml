pages:
  - name: Home
    columns:
      - size: small
        widgets:
          - type: clock
            hour-format: 24h

          - type: weather
            location: Madrid, Spain
            units: metric
            hour-format: 24h

          - type: dns-stats
            service: pihole-v6
            url: http://pihole
            password: ${PIHOLE_PASSWORD}

      - size: full
        widgets:
          - type: monitor
            cache: 1m
            title: Media & Files
            sites:
              - title: Immich
                url: http://immich.${DOMAIN}
                check-url: http://immich-server:2283
                icon: di:immich
              - title: qBittorrent
                url: http://qbittorrent.${DOMAIN}
                check-url: http://qbittorrent:8080
                alt-status-codes: [401]
                icon: di:qbittorrent
              - title: Copyparty
                url: http://files.${DOMAIN}
                check-url: http://copyparty:3923
                icon: di:copyparty

          - type: monitor
            cache: 1m
            title: Apps
            sites:
              - title: Open WebUI
                url: http://chat.${DOMAIN}
                check-url: http://openwebui:8080
                icon: di:open-webui
              - title: Excalidraw
                url: http://excalidraw.${DOMAIN}
                check-url: http://excalidraw:80
                icon: di:excalidraw
              - title: Hermes
                url: http://hermes.${DOMAIN}
                check-url: http://hermes:9119
                alt-status-codes: [401]
                icon: mdi:robot-outline

          - type: monitor
            cache: 1m
            title: Infrastructure
            sites:
              - title: Pi-hole
                url: http://pihole.${DOMAIN}/admin/
                check-url: http://pihole/admin/
                icon: di:pi-hole
              - title: Traefik
                url: http://traefik.${DOMAIN}
                check-url: http://traefik:8080/dashboard/
                icon: di:traefik
              - title: Dockhand
                url: http://docker.${DOMAIN}
                check-url: http://dockhand:3000
                icon: mdi:docker
              - title: Dozzle
                url: http://logs.${DOMAIN}
                check-url: http://dozzle:8080
                icon: di:dozzle
              - title: Uptime Kuma
                url: http://uptime.${DOMAIN}
                check-url: http://uptime-kuma:3001
                icon: di:uptime-kuma
              - title: Backrest
                url: http://backup.${DOMAIN}
                check-url: http://backrest:9898
                icon: di:backrest

          - type: rss
            title: News
            style: horizontal-cards
            cache: 3h
            limit: 12
            collapse-after: 6
            feeds:
              - url: https://hnrss.org/frontpage
                title: Hacker News
              - url: https://selfh.st/rss/
                title: selfh.st
              - url: https://www.reddit.com/r/selfhosted/.rss
                title: r/selfhosted
              - url: https://feeds.arstechnica.com/arstechnica/index
                title: Ars Technica
              - url: https://www.theverge.com/rss/index.xml
                title: The Verge
