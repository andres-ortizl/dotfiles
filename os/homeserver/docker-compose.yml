name: lab

networks:
  traefik:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/24
  pihole_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/16

volumes:
  model-cache:
  immich-db:
  immich-redis:

services:
  # Traefik Reverse Proxy
  traefik:
    image: traefik:v3.5.4
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80" # HTTP
      - "443:443" # HTTPS
      - "9090:8080" # Traefik dashboard on port 9090
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.websecure.transport.respondingTimeouts.readTimeout=0
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard-secure.rule=Host(`traefik.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.dashboard-secure.entrypoints=websecure"
      - "traefik.http.routers.dashboard-secure.tls=true"
      - "traefik.http.routers.dashboard-secure.service=api@internal"

  # Glance Dashboard
  glance:
    image: glanceapp/glance:latest
    container_name: glance
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Madrid}
      - DOMAIN=${DOMAIN:-localhost}
      - PIHOLE_PASSWORD=${PIHOLE_PASSWORD:-admin}
    volumes:
      - ./config/glance:/app/config:ro
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.http.routers.glance.rule=Host(`home.${DOMAIN:-localhost}`) || Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.glance.entrypoints=web"
      - "traefik.http.routers.glance-secure.rule=Host(`home.${DOMAIN:-localhost}`) || Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.glance-secure.entrypoints=websecure"
      - "traefik.http.routers.glance-secure.tls=true"
      - "traefik.http.services.glance.loadbalancer.server.port=8080"

  # Dockhand - Docker Management UI
  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Madrid}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/dockhand:/data
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.http.routers.dockhand.rule=Host(`docker.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.dockhand.entrypoints=web"
      - "traefik.http.routers.dockhand-secure.rule=Host(`docker.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.dockhand-secure.entrypoints=websecure"
      - "traefik.http.routers.dockhand-secure.tls=true"
      - "traefik.http.services.dockhand.loadbalancer.server.port=3000"

  # Watchtower Auto-updater (only updates containers with watchtower.enable=true label)
  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_REMOVE_VOLUMES=false
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
      - TZ=${TZ:-Europe/Madrid}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - traefik

  # Tailscale - VPN Access
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: homeserver
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ROUTES=172.18.0.0/24,172.31.0.0/16,192.168.1.0/24
      - TS_ACCEPT_DNS=false
    volumes:
      - ./data/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    networks:
      - traefik
      - pihole_network

  # Pi-hole DNS Server
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Madrid}
      - WEBPASSWORD=${PIHOLE_PASSWORD:-admin}
      - PIHOLE_DNS_=${PIHOLE_DNS:-1.1.1.1;1.0.0.1}
      - DNSMASQ_LISTENING=all
      - DNSSEC=true
      - WEBTHEME=default-dark
      - VIRTUAL_HOST=pihole.${DOMAIN:-localhost}
      - PIHOLE_DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./config/pihole/etc-pihole:/etc/pihole
      - ./config/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3333:80"
    dns:
      - 127.0.0.1
      - 1.1.1.1
    cap_add:
      - NET_ADMIN
    networks:
      traefik: {}
      pihole_network:
        ipv4_address: "172.31.0.100"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pihole.rule=Host(`pihole.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.pihole.entrypoints=web"
      - "traefik.http.routers.pihole-secure.rule=Host(`pihole.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.pihole-secure.entrypoints=websecure"
      - "traefik.http.routers.pihole-secure.tls=true"
      - "traefik.http.services.pihole.loadbalancer.server.port=80"
      - "com.centurylinklabs.watchtower.enable=true"
      - "homepage.group=Network"
      - "homepage.name=Pi-hole"
      - "homepage.icon=pihole.png"
      - "homepage.href=http://pihole.${DOMAIN:-localhost}:3333/admin"
      - "homepage.description=Network-wide ad blocking and DNS"
      - "homepage.weight=1"
      - "homepage.widget.type=pihole"
      - "homepage.widget.url=http://pihole"
      - "homepage.widget.key=${PIHOLE_API_KEY:-}"

  # DHCP Helper for Pi-hole
  dhcphelper:
    image: noamokman/dhcp-helper
    container_name: dhcp-helper
    restart: unless-stopped
    network_mode: "host"
    command: -s 172.31.0.100
    cap_add:
      - NET_ADMIN

  # qBittorrent Download Client
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Madrid}
      - WEBUI_PORT=8080
    volumes:
      - ./config/qbittorrent:/config
      - ${DATA_ROOT:-./data/shared}:/data
    ports:
      - "6881:6881"
      - "6881:6881/udp"
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.qbittorrent.entrypoints=web"
      - "traefik.http.routers.qbittorrent.service=qbittorrent"
      - "traefik.http.routers.qbittorrent-secure.rule=Host(`qbittorrent.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.qbittorrent-secure.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent-secure.tls=true"
      - "traefik.http.routers.qbittorrent-secure.service=qbittorrent"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"

  # Immich Photo Management
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-v3.0.1}
    container_name: immich_server
    restart: unless-stopped
    volumes:
      - ${UPLOAD_LOCATION:-./data/immich}:/data
      - /etc/localtime:/etc/localtime:ro
      - /home/andrew/immich:/mnt/old-immich:ro
      - /home/andrew/immich-test:/mnt/immich-test:ro
    environment:
      - DB_HOSTNAME=database
    env_file:
      - .env
    depends_on:
      - redis
      - database
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich.rule=Host(`immich.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.immich.entrypoints=web"
      - "traefik.http.routers.immich-secure.rule=Host(`immich.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.immich-secure.entrypoints=websecure"
      - "traefik.http.routers.immich-secure.tls=true"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"
    healthcheck:
      disable: false

  # Immich Machine Learning
  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-v3.0.1}
    container_name: immich_machine_learning
    restart: unless-stopped
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    networks:
      - traefik
    healthcheck:
      disable: false

  # Immich Redis Cache
  redis:
    image: docker.io/valkey/valkey:8-bookworm@sha256:fea8b3e67b15729d4bb70589eb03367bab9ad1ee89c876f54327fc7c6e618571
    container_name: immich_redis
    restart: unless-stopped
    volumes:
      - immich-redis:/data
    networks:
      - traefik
    healthcheck:
      test: redis-cli ping || exit 1

  # Immich PostgreSQL Database
  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    container_name: immich_postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - immich-db:/var/lib/postgresql/data
    shm_size: 128mb
    networks:
      - traefik

  # Open WebUI for AI
  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: openwebui
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Madrid}
    volumes:
      - ./data/openwebui:/app/backend/data
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.http.routers.openwebui.rule=Host(`chat.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.openwebui.entrypoints=web"
      - "traefik.http.routers.openwebui-secure.rule=Host(`chat.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.openwebui-secure.entrypoints=websecure"
      - "traefik.http.routers.openwebui-secure.tls=true"
      - "traefik.http.services.openwebui.loadbalancer.server.port=8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Excalidraw Collaborative Whiteboard
  excalidraw:
    image: excalidraw/excalidraw:latest
    container_name: excalidraw
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Madrid}
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.http.routers.excalidraw.rule=Host(`excalidraw.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.excalidraw.entrypoints=web"
      - "traefik.http.routers.excalidraw-secure.rule=Host(`excalidraw.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.excalidraw-secure.entrypoints=websecure"
      - "traefik.http.routers.excalidraw-secure.tls=true"
      - "traefik.http.services.excalidraw.loadbalancer.server.port=80"

  # Uptime Kuma Monitoring
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Madrid}
    volumes:
      - ./data/uptime-kuma:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.http.routers.uptime-kuma.rule=Host(`uptime.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.uptime-kuma.entrypoints=web"
      - "traefik.http.routers.uptime-kuma-secure.rule=Host(`uptime.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.uptime-kuma-secure.entrypoints=websecure"
      - "traefik.http.routers.uptime-kuma-secure.tls=true"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"

  # Dozzle - Real-time Log Viewer
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.http.routers.dozzle.rule=Host(`logs.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.dozzle.entrypoints=web"
      - "traefik.http.routers.dozzle-secure.rule=Host(`logs.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.dozzle-secure.entrypoints=websecure"
      - "traefik.http.routers.dozzle-secure.tls=true"
      - "traefik.http.services.dozzle.loadbalancer.server.port=8080"

  # Copyparty - File Server with Web UI
  copyparty:
    image: copyparty/min:latest
    container_name: copyparty
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Madrid}
    volumes:
      - ./config/copyparty/config/copyparty.conf:/cfg/config.conf:ro
      - ./data/copyparty:/cfg/hists
      - ${DATA_ROOT:-./data/shared}:/data
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.http.routers.copyparty.rule=Host(`files.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.copyparty.entrypoints=web"
      - "traefik.http.routers.copyparty-secure.rule=Host(`files.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.copyparty-secure.entrypoints=websecure"
      - "traefik.http.routers.copyparty-secure.tls=true"
      - "traefik.http.services.copyparty.loadbalancer.server.port=3923"

  # Backrest - Restic Backup UI
  backrest:
    image: garethgeorge/backrest:latest
    container_name: backrest
    restart: unless-stopped
    environment:
      - BACKREST_DATA=/data
      - BACKREST_CONFIG=/config/config.json
      - XDG_CACHE_HOME=/cache
      - TZ=${TZ:-Europe/Madrid}
    volumes:
      - ./data/backrest/data:/data
      - ./data/backrest/config:/config
      - ./data/backrest/cache:/cache
      - ./backups:/repos
      - ./data:/userdata:ro
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.http.routers.backrest.rule=Host(`backup.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.backrest.entrypoints=web"
      - "traefik.http.routers.backrest-secure.rule=Host(`backup.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.backrest-secure.entrypoints=websecure"
      - "traefik.http.routers.backrest-secure.tls=true"
      - "traefik.http.services.backrest.loadbalancer.server.port=9898"

  # Hermes Agent - Self-hosted AI Agent (Nous Research)
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    shm_size: 1g
    environment:
      - TZ=${TZ:-Europe/Madrid}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${HERMES_DASHBOARD_USER:-andrew}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${HERMES_DASHBOARD_PASSWORD:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./data/hermes:/opt/data
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hermes.rule=Host(`hermes.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.hermes.entrypoints=web"
      - "traefik.http.routers.hermes-secure.rule=Host(`hermes.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.hermes-secure.entrypoints=websecure"
      - "traefik.http.routers.hermes-secure.tls=true"
      - "traefik.http.services.hermes.loadbalancer.server.port=9119"
