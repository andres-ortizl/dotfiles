#  ┬ ┬┬┌┐┌┌┬┐┌─┐┬ ┬  ┬─┐┬ ┬┬  ┌─┐┌─┐
#  │││││││ │││ ││││  ├┬┘│ ││  ├┤ └─┐
#  └┴┘┴┘└┘─┴┘└─┘└┴┘  ┴└─└─┘┴─┘└─┘└─┘

# Float Necessary Windows
windowrule = float on, match:class Rofi
windowrule = center on, match:class Rofi
windowrule = float on, match:class pavucontrol
windowrule = float on, match:class ^$, match:title ^(Picture in picture)$
windowrule = float on, match:title ^(Open File)$
windowrule = center on, match:title ^(Open File)$
windowrule = workspace 4 silent, match:class ^(Spotify)$
# Float scratchpad
windowrule = float on, match:class ^(scratchpad\\.ghostty)$
windowrule = size 1500 800, match:class ^(scratchpad\\.ghostty)$
windowrule = center on, match:class ^(scratchpad\\.ghostty)$

# Set opacity
windowrule = opacity 0.9, match:class ^(scratchpad\\.ghostty)$

# YouTube Music scratchpad (rules applied via script since title changes after creation)
windowrule = animation slide, match:title ^(YouTube Music.*)$
windowrule = opacity 0.85 0.75, match:title ^(YouTube Music.*)$
windowrule = border_color rgb(ca9ee6), match:title ^(YouTube Music.*)$
windowrule = opacity 0.8 0.6, match:class ^(discord)$
windowrule = opacity 0.8 0.6, match:class ^(spotify)$
windowrule = opacity 0.95 override 0.95 override, match:class Rofi
windowrule = opacity 0.9 0.9, match:class ^(dev.zed.Zed)$
windowrule = opacity 0.8 0.6, match:class ^(wlogout)$
windowrule = opacity 0.8 0.6, match:class ^(steam)$

# Rofi Enhanced Animations - Slide up like macOS Spotlight
windowrule = animation popin 80%, match:class Rofi
windowrule = move 0 -10%, match:class Rofi
windowrule = border_color rgb(bd93f9) rgb(bd93f9AA), match:class Rofi

# Animation override
windowrule = animation slide, match:class ^(scratchpad\\.ghostty)$ # sets the animation style for kitty

# Blur layer shells
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace wlogout
layerrule = blur on, match:namespace zen
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi
