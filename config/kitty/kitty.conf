# Font
font_size 18

# Background — translucent + blur
background_opacity 0.9
background_blur 20

# Window
remember_window_size yes
window_padding_width 12 10
hide_window_decorations titlebar-only
confirm_os_window_close 0
inactive_text_alpha 0.7
window_margin_width 0
single_window_margin_width 0
window_border_width 1px
draw_minimal_borders yes
active_border_color #cba6f7
inactive_border_color #313244

# macOS
macos_option_as_alt yes
macos_quit_when_last_window_closed yes
macos_show_window_title_in none

# Mouse
mouse_hide_wait 1.0
copy_on_select no

# Tabs at the BOTTOM — la razón principal de usar kitty
tab_bar_edge bottom
tab_bar_style separator
tab_separator " ┇ "
tab_bar_min_tabs 1
tab_title_template "{index}: {title}"
active_tab_foreground   #1e1e2e
active_tab_background   #cba6f7
active_tab_font_style   bold
inactive_tab_foreground #6c7086
inactive_tab_background #1e1e2e

# Layouts (splits + stack para fullscreen)
enabled_layouts splits,stack

# Catppuccin Mocha
foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #f5e0dc
cursor                  #f5e0dc
cursor_text_color       #1e1e2e
url_color               #f5e0dc

color0  #45475a
color8  #585b70
color1  #f38ba8
color9  #f38ba8
color2  #a6e3a1
color10 #a6e3a1
color3  #f9e2af
color11 #f9e2af
color4  #89b4fa
color12 #89b4fa
color5  #f5c2e7
color13 #f5c2e7
color6  #94e2d5
color14 #94e2d5
color7  #bac2de
color15 #a6adc8

# Tabs
map cmd+t new_tab_with_cwd
map cmd+w close_tab
map cmd+shift+w close_window
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
map cmd+shift+left_bracket previous_tab
map cmd+shift+right_bracket next_tab

# Splits
map cmd+d launch --location=vsplit --cwd=current
map cmd+shift+d launch --location=hsplit --cwd=current
map cmd+alt+left neighboring_window left
map cmd+alt+right neighboring_window right
map cmd+alt+up neighboring_window up
map cmd+alt+down neighboring_window down

# Reload
map cmd+shift+r load_config_file
