padding-x = 12
padding-y = [0, 0]
confirm-before-quit = false
option-as-alt = "left"
hide-mouse-cursor-when-typing = true

[shell]
program = "/bin/zsh"
args = ["--login"]

[fonts]
size = 18
family = "FiraCode Nerd Font"
features = ["liga", "calt", "ss01", "ss02", "ss03", "ss05"]

[fonts.regular]
family = "FiraCode Nerd Font"
style = "Regular"

[fonts.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[fonts.italic]
family = "FiraCode Nerd Font"
style = "Light"

[fonts.bold-italic]
family = "FiraCode Nerd Font"
style = "Bold"

[cursor]
shape = "block"
blinking = false

[scroll]
multiplier = 3.0
divider = 1.0

[panel]
padding = [0]
margin = [0]
border-width = 1.5
row-gap = 0
column-gap = 0

[bell]
visual = false
audio = false

[window]
opacity = 0.7
blur = "macos-glass-regular"
decorations = "Buttonless"
mode = "Maximized"

[renderer]
backend = "Metal"
target-fps = 120
disable-unfocused-render = true

[navigation]
mode = "Plain"
cwd = true
unfocused-split-opacity = 0.7

[bindings]
keys = [
  # Tabs (invisible — Plain mode)
  { key = "t", with = "super", action = "CreateTab" },
  { key = "w", with = "super", action = "CloseSplitOrTab" },
  { key = "w", with = "super | shift", action = "CloseTab" },
  { key = "1", with = "super", action = "SelectTab(0)" },
  { key = "2", with = "super", action = "SelectTab(1)" },
  { key = "3", with = "super", action = "SelectTab(2)" },
  { key = "4", with = "super", action = "SelectTab(3)" },
  { key = "5", with = "super", action = "SelectTab(4)" },
  { key = "6", with = "super", action = "SelectTab(5)" },
  { key = "7", with = "super", action = "SelectTab(6)" },
  { key = "8", with = "super", action = "SelectTab(7)" },
  { key = "9", with = "super", action = "SelectLastTab" },
  { key = "]", with = "super | shift", action = "SelectNextTab" },
  { key = "[", with = "super | shift", action = "SelectPrevTab" },

  # Scroll
  { key = "PageUp", action = "ScrollPageUp" },
  { key = "PageDown", action = "ScrollPageDown" },
  { key = "Home", with = "super", action = "ScrollToTop" },
  { key = "End", with = "super", action = "ScrollToBottom" },

  # Splits
  { key = "d", with = "super", action = "SplitRight" },
  { key = "d", with = "super | shift", action = "SplitDown" },
  { key = "Left", with = "super | alt", action = "SelectPrevSplit" },
  { key = "Right", with = "super | alt", action = "SelectNextSplit" },
  { key = "Up", with = "super | alt", action = "SelectPrevSplit" },
  { key = "Down", with = "super | alt", action = "SelectNextSplit" },
]

[colors]
background = "#1e1e2e"
foreground = "#cdd6f4"
cursor = "#f5e0dc"
selection-background = "#585b70"
selection-foreground = "#cdd6f4"
tabs-active = "#cba6f7"
tabs-active-foreground = "#1e1e2e"
tabs = "#181825"
tabs-foreground = "#6c7086"
bar = "#181825"
split = "#cba6f7"
split-active = "#f5c2e7"
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#bac2de"
light-black = "#585b70"
light-red = "#f38ba8"
light-green = "#a6e3a1"
light-yellow = "#f9e2af"
light-blue = "#89b4fa"
light-magenta = "#f5c2e7"
light-cyan = "#94e2d5"
light-white = "#a6adc8"
